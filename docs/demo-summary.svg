<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Beta Test Skill summary preview</title>
  <desc id="desc">A preview of recurring beta-test issues ranked by frequency and severity.</desc>
  <rect width="960" height="520" fill="#101418"/>
  <rect x="40" y="38" width="880" height="444" rx="14" fill="#f8fafc"/>
  <text x="72" y="94" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Beta Test Summary</text>
  <text x="72" y="130" font-family="Arial, sans-serif" font-size="16" fill="#475569">5 agent beta testers, 13 issues, 4 recurring themes</text>
  <rect x="72" y="166" width="816" height="64" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="96" y="196" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#9a3412">Checkout button gave no progress feedback</text>
  <text x="96" y="218" font-family="Arial, sans-serif" font-size="14" fill="#7c2d12">Seen in 4 of 5 runs · medium severity · tester quote: "I thought it broke."</text>
  <rect x="72" y="248" width="816" height="64" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="96" y="278" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#3730a3">Mobile nav hides the pricing link</text>
  <text x="96" y="300" font-family="Arial, sans-serif" font-size="14" fill="#312e81">Seen in 3 of 5 runs · high severity · blocks plan comparison</text>
  <rect x="72" y="330" width="816" height="64" rx="8" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="96" y="360" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">Secondary text contrast feels too faint</text>
  <text x="96" y="382" font-family="Arial, sans-serif" font-size="14" fill="#14532d">Seen in 2 of 5 runs · low severity · design polish feedback</text>
  <text x="72" y="438" font-family="Arial, sans-serif" font-size="14" fill="#64748b">JSON + Markdown + CSV exports for triage, design review, and repeated runs.</text>
</svg>

