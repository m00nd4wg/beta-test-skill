name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Local skill validation
        run: python tools/check_skill.py beta-test-app
      - name: Python unit tests
        run: python -m unittest discover -s tests
      - name: Validate example report
        run: python beta-test-app/scripts/validate_report.py examples/reports/run-001.json
      - name: Aggregate example reports
        run: python beta-test-app/scripts/aggregate_reports.py examples/reports --output /tmp/beta-test-summary
      - name: Runner CLI smoke test
        run: node runner/evidence-runner.js --help
      - name: Optional Agent Skills reference validation
        continue-on-error: true
        run: |
          python -m pip install --upgrade skills-ref
          skills-ref validate beta-test-app

